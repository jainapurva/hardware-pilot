<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00979D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005C5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00979D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />
  <!-- Circuit traces -->
  <path d="M 40 100 H 70 V 65 H 90" stroke="#4ECDC4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110 65 H 130 V 100 H 160" stroke="#4ECDC4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 40 120 H 60 V 140 H 90" stroke="#4ECDC4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110 140 H 140 V 120 H 160" stroke="#4ECDC4" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Circuit nodes -->
  <circle cx="70" cy="65" r="4" fill="#4ECDC4"/>
  <circle cx="130" cy="65" r="4" fill="#4ECDC4"/>
  <circle cx="60" cy="140" r="4" fill="#4ECDC4"/>
  <circle cx="140" cy="140" r="4" fill="#4ECDC4"/>
  <!-- Center chip / brain -->
  <rect x="80" y="55" width="40" height="40" rx="6" fill="#1a1a2e" stroke="url(#glow)" stroke-width="2.5"/>
  <!-- AI brain symbol -->
  <circle cx="100" cy="72" r="8" fill="none" stroke="#4ECDC4" stroke-width="2"/>
  <circle cx="100" cy="72" r="3" fill="#4ECDC4"/>
  <path d="M 92 72 C 92 65 108 65 108 72" stroke="#4ECDC4" stroke-width="1.5" fill="none"/>
  <path d="M 94 76 C 94 82 106 82 106 76" stroke="#4ECDC4" stroke-width="1.5" fill="none"/>
  <!-- Chip pins -->
  <rect x="85" y="50" width="4" height="8" rx="1" fill="#4ECDC4"/>
  <rect x="95" y="50" width="4" height="8" rx="1" fill="#4ECDC4"/>
  <rect x="105" y="50" width="4" height="8" rx="1" fill="#4ECDC4"/>
  <rect x="85" y="92" width="4" height="8" rx="1" fill="#4ECDC4"/>
  <rect x="95" y="92" width="4" height="8" rx="1" fill="#4ECDC4"/>
  <rect x="105" y="92" width="4" height="8" rx="1" fill="#4ECDC4"/>
  <!-- Camera lens (bottom) -->
  <circle cx="100" cy="130" r="14" fill="#1a1a2e" stroke="url(#glow)" stroke-width="2"/>
  <circle cx="100" cy="130" r="9" fill="none" stroke="#4ECDC4" stroke-width="1.5"/>
  <circle cx="100" cy="130" r="4" fill="#4ECDC4" opacity="0.8"/>
  <!-- Camera flash -->
  <rect x="115" cy="120" width="6" height="4" rx="1" fill="#4ECDC4" opacity="0.6" x="116" y="119"/>
  <!-- Text -->
  <text x="100" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="2">HWP</text>
</svg>
